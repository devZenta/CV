name: Release CV

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    if: contains(github.event.head_commit.message, '[release]') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Chromium system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev libxshmfence-dev libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libpango-1.0-0 libcairo2 libasound2t64

      - name: Generate PDF
        run: bun src/build.js

      - name: Get release tag
        id: tag
        run: echo "value=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.tag.outputs.value }}
          name: "CV Hugo GHESQUIER — ${{ steps.tag.outputs.value }}"
          files: CV/CV_Hugo_GHESQUIER.pdf
